name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # macOS exercises the BSD awk/tr, shasum, and readlink -f branches
        # the hooks rely on; Ubuntu covers the GNU userland.
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Hook templates are executable
        run: |
          fails=0
          for f in plugins/harness-kit/skills/harness-kit/templates/scripts/hooks/*.sh \
                   plugins/harness-kit/skills/harness-kit/templates/scripts/*.sh; do
            [ -x "$f" ] || { echo "not executable: $f"; fails=1; }
          done
          exit $fails
      - name: Install ShellCheck
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            if [ "$RUNNER_OS" = "Linux" ]; then
              sudo apt-get update -q && sudo apt-get install -qy shellcheck
            else
              brew install shellcheck
            fi
          fi
      # verify.sh is the executable definition of "done" (shellcheck ->
      # manifest JSON -> template regression tests -> check-harness.sh,
      # plus the evals gate). Running it directly here — rather than
      # reconstructing its steps one by one in this workflow — means a gate
      # added to verify.sh can never silently drop out of CI; the two used
      # to drift, which is exactly the failure mode this avoids. Needs git
      # + jq, both preinstalled on GitHub-hosted ubuntu-latest/macos-latest
      # runners.
      #
      # info/style shellcheck notices are acceptable in templates (helpers
      # sit next to commented TAILOR arms); verify.sh's shellcheck gate
      # fails on warning and above, and lints both the shipped templates and
      # the root-only tailored scripts (verify.sh, check-packaging.sh, …),
      # which have no template twin.
      - name: verify.sh
        run: bash scripts/verify.sh
