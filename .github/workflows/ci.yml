name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hook templates are executable
        run: |
          fails=0
          for f in plugin/skills/harness-kit/templates/scripts/hooks/*.sh \
                   plugin/skills/harness-kit/templates/scripts/*.sh; do
            [ -x "$f" ] || { echo "not executable: $f"; fails=1; }
          done
          exit $fails
      - name: Regression tests
        run: |
          fails=0
          for t in plugin/skills/harness-kit/templates/scripts/test-*.sh \
                   plugin/skills/harness-kit/templates/scripts/hooks/test-*.sh; do
            echo "== $t"
            bash "$t" || fails=1
          done
          exit $fails
      - name: ShellCheck
        run: |
          sudo apt-get update -q && sudo apt-get install -qy shellcheck
          # info/style notices are acceptable in templates (helpers sit next
          # to commented TAILOR arms); fail on warning and above.
          shellcheck -x --severity=warning \
                        plugin/skills/harness-kit/templates/scripts/*.sh \
                        plugin/skills/harness-kit/templates/scripts/hooks/*.sh
