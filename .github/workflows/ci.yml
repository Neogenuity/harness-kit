name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # macOS exercises the BSD awk/tr, shasum, and readlink -f branches
        # the hooks rely on; Ubuntu covers the GNU userland.
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Hook templates are executable
        run: |
          fails=0
          for f in plugins/harness-kit/skills/harness-kit/templates/scripts/hooks/*.sh \
                   plugins/harness-kit/skills/harness-kit/templates/scripts/*.sh; do
            [ -x "$f" ] || { echo "not executable: $f"; fails=1; }
          done
          exit $fails
      - name: Regression tests
        run: |
          fails=0
          for t in plugins/harness-kit/skills/harness-kit/templates/scripts/test-*.sh \
                   plugins/harness-kit/skills/harness-kit/templates/scripts/hooks/test-*.sh; do
            echo "== $t"
            bash "$t" || fails=1
          done
          exit $fails
      - name: ShellCheck
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            if [ "$RUNNER_OS" = "Linux" ]; then
              sudo apt-get update -q && sudo apt-get install -qy shellcheck
            else
              brew install shellcheck
            fi
          fi
          # info/style notices are acceptable in templates (helpers sit next
          # to commented TAILOR arms); fail on warning and above. Lint the
          # shipped templates AND the root-only tailored scripts (verify.sh,
          # check-packaging.sh, …), which have no template twin.
          shellcheck -x --severity=warning \
                        plugins/harness-kit/skills/harness-kit/templates/scripts/*.sh \
                        plugins/harness-kit/skills/harness-kit/templates/scripts/hooks/*.sh \
                        scripts/*.sh scripts/hooks/*.sh
