# Drift gate for the agent harness. Add as .github/workflows/harness-check.yml
# (or fold the run step into an existing CI workflow).
name: harness-check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  harness-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Validate agent harness
        run: bash scripts/check-harness.sh
      - name: Validate dual-provider packaging
        run: bash scripts/check-packaging.sh
