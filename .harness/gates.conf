# .harness/gates.conf — THIS repo's quality-gate declarations, run by
# `bash scripts/harness/verify` (the kit-owned runner; this file is the
# repo-owned policy half). One gate per line:
#
#   gate          <label> <command...>     # both modes; keep fast (ms-s)
#   full          <label> <command...>     # serial; skipped under --fast
#   parallel      <label> <command...>     # independent; queued to the barrier
#   parallel-each <label-prefix> <glob...> # one parallel gate per matching
#                                          # file; each runs `bash <file>`
#
# Commands run via `bash -c` from the repo root. Keep serial gates
# cheapest-first; a `full` gate is a barrier for parallel gates declared
# before it. Only parallelize gates that do not consume one another's
# outputs or share mutable fixtures.

# -- TAILOR: the quality gates -------------------------------------------------
# This repo is shell + markdown + JSON: lint every script (shipped templates
# and the installed copies), validate the plugin manifests, run the template
# regression tests, and the harness drift gate.
gate shellcheck T=plugins/harness-kit/skills/harness-kit/templates/scripts; C="bootstrap verify sync check-harness check-instructions check-docs detect-drift validate-plan run-evals"; shellcheck -x --severity=warning $T/hooks/*.sh $T/harness/lib/*.sh $T/harness/hooks/*.sh $T/harness/tests/*.sh $(for c in $C; do echo "$T/harness/$c" "scripts/harness/$c"; done) scripts/*.sh scripts/harness/lib/*.sh scripts/harness/hooks/*.sh scripts/harness/tests/*.sh .harness/hooks/*.sh .harness/evals/scenarios/verify-live-runtime/*.sh .harness/evals/scenarios/verify-live-runtime/fixture/*.sh .harness/evals/scenarios/verify-live-runtime/reference/*.sh
full manifests bash scripts/check-packaging.sh
# Every template regression script owns its scratch fixtures — safe to
# schedule independently.
parallel-each template-test plugins/harness-kit/skills/harness-kit/templates/scripts/harness/tests/test-*.sh
# Root-only dogfood gates: provider templates (#8d), template<->install
# byte-sync, fixture isolation (the v0.18.0 leak class), and the
# maintainer-only install/update/recovery + checker conformance suites
# (descoped from the shipped set in v0.22.0 — adopters run the shipped
# smoke test; these tailored root copies keep proving the kit's own
# install/update/recovery and checker contracts).
parallel provider-templates bash scripts/test-provider-templates.sh
parallel template-sync bash scripts/test-template-sync.sh
parallel fixture-isolation bash scripts/test-fixture-isolation.sh
parallel install-suite-core bash scripts/test-install-core.sh
parallel install-suite-update bash scripts/test-install-update.sh
parallel install-suite-recovery bash scripts/test-install-recovery.sh
parallel checker-suite bash scripts/test-check-harness.sh
# Behavioral-eval grader validity for THIS repo's real golden-task bank —
# validated here once, with no model in the loop (the template test only
# covers the shipped _template's empty bank).
parallel evals bash scripts/test-eval.sh
# Root-only deterministic proof of the app runtime contract. Python 3 is a
# harness-kit contributor prerequisite, not an installed-harness dependency.
parallel runtime-fixture bash .harness/evals/scenarios/verify-live-runtime/test-fixture.sh
# The full harness coherence check. HARNESS_NESTED_FIXTURE makes the install
# smoke suite self-skip inside the checker's test loop (its fixture would
# re-run the checker); the template-test gates above already run the
# byte-identical template copies of the floor, so the checker's serial
# re-run of the installed copies stays cheap. This dedup only exists in
# THIS dogfood repo — a user install keeps the shipped default gates.conf.
parallel harness env HARNESS_NESTED_FIXTURE=1 bash scripts/harness/check-harness
# ------------------------------------------------------------------------------
