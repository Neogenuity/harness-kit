# harness.conf — shared tailoring surface for the agent-harness scripts.
# Sourced (as shell) by sync-agent-skills.sh, check-harness.sh, and
# session-context.sh. Keep it to simple VAR="value" lines.

# Provider directories that receive generated skill stubs.
# No .codex here: Codex discovers project skills via .agents/skills/,
# so the .agents stubs already cover it.
PROVIDERS=".claude .cursor .opencode .agents"

# Canonical (single-source-of-truth) locations.
CANONICAL_SKILLS="docs/skills"
CANONICAL_AGENTS="docs/agents"

# Declared provider sets, validated by check-harness.sh (never inferred from
# directory presence). HOOK_WIRED_PROVIDERS: dirs whose hook config is checked
# tuple-by-tuple against the frozen provider-matrix hook table (OpenCode is
# descoped — no bash hook shim). AGENT_PROVIDERS: dirs that receive generated
# agent stubs from docs/agents/ frontmatter (includes .codex TOML, excludes
# .agents). This repo wires all three hook providers and all four agent
# providers. See the template harness.conf for the full migration contract.
HOOK_WIRED_PROVIDERS=".claude .cursor .codex"
AGENT_PROVIDERS=".claude .cursor .codex .opencode"

# This repo dogfoods every stable provider execution profile. The declaration
# is explicit and independent from hook/agent wiring; check-harness.sh validates
# only this confirmed set.
EXECUTION_PROFILE_PROVIDERS=".claude .cursor .codex .opencode"

# Directory whose *.md files are announced by session-context.sh.
PLANS_DIR="docs/plans/active"

# This repo ships the provider/capability matrix; point the doctor's freshness
# check at it so our own "verified <date>" stamps can't silently rot.
PROVIDER_MATRIX_DOC="plugins/harness-kit/skills/harness-kit/references/provider-matrix.md"

# -- TAILOR: MCP trust inventory -----------------------------------------------
# Single source for which MCP servers this repo trusts, and what each one is
# expected to run. check-harness.sh (#8c) extracts the enabled servers from
# .mcp.json, .cursor/mcp.json, opencode.json ("mcp"), and .codex/config.toml
# ([mcp_servers.*]) and audits them against this list. One entry per line:
#
#     <name>  <expected-identity-substring>
#
# The substring is matched fixed-string (no globs) against the server's
# configured command+args, or its URL. It detects drift (an allowed name
# repointed at other code); it does NOT prove equivalence — as honest as the
# SECRET_PATTERNS substring discipline.
#
# This repo runs NO MCP servers, so the inventory is SET-BUT-EMPTY: strict mode
# with an empty allow-list. #8c stays silent (there are no configs to audit)
# while dogfooding the post-adoption posture — the moment any .mcp.json /
# .cursor/mcp.json / opencode.json "mcp" / .codex/config.toml [mcp_servers.*]
# appears, every enabled server it declares becomes a check-harness ERROR until
# it is added here with its pinned identity substring (in the same commit).
MCP_ALLOWED_SERVERS=""
# ------------------------------------------------------------------------------

# Hook observability: guards append one JSON line per deny / advisory /
# lint-findings event to .harness/log.jsonl (git-ignored — see hook_log in
# hooks/lib.sh). The audit workflow summarizes it: repeated denials mark the
# next mistake to engineer away. Set to 0 to disable.
HARNESS_LOG=1

# -- TAILOR: secret-file classification ----------------------------------------
# Single source for the secret-read policy: hooks/guard-secrets.sh enforces it
# at read time, and check-harness.sh verifies the native provider deny lists
# (.claude/settings.json) stay in sync. Space-separated basename globs,
# matched case-insensitively; allow patterns win over secret patterns.
# Mirror any additions into hooks/test-guard-secrets.sh cases.
SECRET_ALLOW_PATTERNS=".env.example .env.sample .env.dist .env.testing *.example"
SECRET_PATTERNS=".env .env.* auth.json credentials.json *.pem id_rsa id_ed25519"
# ------------------------------------------------------------------------------

# Optional hint appended to guard-config.sh deny messages (see the template's
# harness.conf). This repo ships its behavior from the plugin templates/ dir.
GUARD_DENY_HINT="This repo ships its behavior from plugins/harness-kit/skills/harness-kit/templates/ — edit the template there and roll it into the installed copy; do not edit the installed file directly."

# session-context.sh recent-commits banner block: off (context-efficiency trim).
BANNER_RECENT_COMMITS=0
