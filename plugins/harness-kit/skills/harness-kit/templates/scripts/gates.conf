# .harness/gates.conf — this repo's quality-gate declarations, run by
# `bash scripts/harness/verify` (the kit-owned runner; this file is the
# repo-owned policy half). One gate per line:
#
#   gate          <label> <command...>     # both modes; keep fast (ms-s)
#   full          <label> <command...>     # serial; skipped under --fast
#   parallel      <label> <command...>     # independent; queued to the barrier
#   parallel-each <label-prefix> <glob...> # one parallel gate per matching
#                                          # file; each runs `bash <file>`
#
# Commands run via `bash -c` from the repo root. Keep serial gates
# cheapest-first; a `full` gate is a barrier for parallel gates declared
# before it. Only parallelize gates that do not consume one another's
# outputs or share mutable fixtures.

# -- TAILOR: the quality gates -------------------------------------------------
# Write the interviewed gates for this repo's stack. Examples:
#   gate     format     npx prettier --check .
#   gate     lint       npx eslint .
#   full     typecheck  npx tsc --noEmit
#   full     tests      npx vitest run
# Application repos can add a serial live smoke gate:
#   full     smoke      bash scripts/dev.sh health
# ------------------------------------------------------------------------------

# The shipped floor every install keeps: the regression suites the kit
# installs (hook behavioral tests, runtime suites, the install smoke test).
# That floor is run ONCE by the parallel-each harness-test gate above; the
# harness gate below skips re-running it (check #6) via
# HARNESS_SKIP_TESTS_FAMILY=1, keeping the cheap #5/#5b static checks and all
# other check families. This removes the shipped floor's redundant
# re-execution for adopters.
parallel-each harness-test scripts/harness/tests/test-*.sh
parallel harness env HARNESS_SKIP_TESTS_FAMILY=1 bash scripts/harness/check-harness
