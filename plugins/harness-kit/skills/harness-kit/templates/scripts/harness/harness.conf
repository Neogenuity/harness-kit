# harness.conf — shared tailoring surface for the agent-harness scripts.
# Sourced (as shell) by sync-agent-skills.sh, check-harness.sh, and
# session-context.sh. Keep it to simple VAR="value" lines.

# -- TAILOR: the single provider declaration -----------------------------------
# HARNESS_PROVIDERS names the provider dirs this repo wires — the ONE list an
# adopter maintains. The kit-owned capability table
# (scripts/harness/lib/provider-caps) derives the per-facet sets from it:
#   * skill stubs   — providers that do NOT read .agents/skills/ natively
#                     (.codex reads it natively, so it gets no skill stub);
#   * agent stubs   — providers with a generated-agent dialect (all four);
#   * hook wiring   — providers with a bash hook shim (.opencode is descoped).
# check-harness.sh validates the DERIVED sets and the declaration itself
# (every entry must be a known provider), never inferring wiring from directory
# presence — a provider dir also holds generated stubs, so a deleted config
# would be indistinguishable from one never wired. Set to "" for a harness that
# wires no providers. INIT populates this; a legacy install that predates it
# keeps the explicit override lists below, which update/audit migrates into
# HARNESS_PROVIDERS once (never inferred from surviving configs).
HARNESS_PROVIDERS=".claude .cursor .codex .opencode"

# Canonical (single-source-of-truth) locations.
CANONICAL_SKILLS=".agents/skills"
CANONICAL_AGENTS=".harness/agents"

# -- TAILOR: per-facet overrides (optional; each defaults to the derivation) ----
# Each wiring facet defaults to HARNESS_PROVIDERS filtered by the capability
# table. Uncomment one to OVERRIDE its derived membership — e.g. wire .codex
# hooks but suppress its (nonexistent) skill stub, or ship agent stubs to a
# subset. An explicit value always wins; leave commented to derive. These are
# also where a legacy pre-declaration install's sets live until migrated.
# PROVIDERS=".claude .cursor .opencode"                       # skill-stub dirs
# HOOK_WIRED_PROVIDERS=".claude .cursor .codex"               # hook-wired dirs
# AGENT_PROVIDERS=".claude .cursor .codex .opencode"          # agent-stub dirs
# ------------------------------------------------------------------------------

# -- TAILOR: opt-in stable execution profiles ----------------------------------
# Provider dirs whose native sandbox / permission config adopts harness-kit's
# stable execution-profile floor. Deliberately NOT derived from
# HARNESS_PROVIDERS (ADR 011): the strict runtime floors (default-deny network,
# empty writable roots) routinely conflict with local dev, so adopting a
# provider must never auto-impose its execution policy. This stays an explicit
# opt-in; check-harness.sh validates only the declared set (and that it is a
# subset of HARNESS_PROVIDERS — you cannot floor a provider you do not wire) and
# never infers adoption from whichever config files survive on disk.
#
# Leave UNSET (the default) or set to "" for no adoption. On explicit adoption,
# set a space-separated subset of your wired providers. A declared provider's
# missing, malformed, or weakened config is an ERROR.
# EXECUTION_PROFILE_PROVIDERS=".claude .cursor .codex .opencode"
# ------------------------------------------------------------------------------

# Directory whose *.md files are announced by session-context.sh.
PLANS_DIR="docs/plans/active"

# Optional: a reference doc whose "verified <date>" stamps check-harness.sh's
# doctor keeps fresh (e.g. a provider/capability matrix). Repo-relative; unset
# by default since most repos have no such doc. Staleness ages are tunable via
# HARNESS_MATRIX_STALE_DAYS (default 90) and HARNESS_PLAN_STALE_DAYS (default 30).
# PROVIDER_MATRIX_DOC="references/provider-matrix.md"

# -- TAILOR: MCP trust inventory -----------------------------------------------
# Single source for which MCP servers this repo trusts, and what each one is
# expected to run. check-harness.sh (#8c) extracts the enabled servers from
# .mcp.json, .cursor/mcp.json, opencode.json ("mcp"), and .codex/config.toml
# ([mcp_servers.*]) and audits them against this list. One entry per line:
#
#     <name>  <expected-identity-substring>
#
# The substring is matched fixed-string (no globs) against the server's
# configured command+args, or its URL — a fragment specific enough to pin the
# server's identity (a package name, a container image, a hostname). It detects
# drift (an allowed name repointed at other code); it does NOT prove
# equivalence, exactly as honest as the SECRET_PATTERNS substring discipline.
#
# Two modes, chosen by whether this variable is set at all:
#   * UNSET (leave the assignment below commented out) — "no inventory
#     declared". The default, because most repos run no MCP servers. #8c stays
#     silent until a server appears, then WARNs once (the adoption path).
#   * SET, even to "" — strict mode. Once declared, any enabled server whose
#     name is absent here, or whose identity no longer contains its pinned
#     substring, is a check-harness ERROR. Add the line in the same commit that
#     adds the server; re-verify the substring when you bump the server (a
#     version-locked path drifts on upgrade by design — update it deliberately,
#     never loosen it to nothing).
#
# MCP_ALLOWED_SERVERS="
# filesystem   @modelcontextprotocol/server-filesystem
# company-api  https://mcp.internal.example.com/
# "
# ------------------------------------------------------------------------------

# -- TAILOR: format + fast-lint maps (hooks/format.sh policy) ------------------
# Data consumed by the post-edit format hook: one `<glob[|glob...]>=<command>`
# per line; the edited file is appended as the command's last argument, the
# first matching rule per list wins, and a missing binary is a silent no-op
# (fail-open). '|' separates glob alternatives. The command template is
# word-split — a tool needing space-containing arguments gets a small
# repo-owned wrapper script instead. FORMAT_RULES rewrite the file;
# LINT_RULES must be millisecond-fast (slow static analysis belongs in
# verify's gates, not on every edit) and their failures feed back in-turn.
# Examples:
#   *.php=vendor/bin/pint
#   *.ts|*.tsx|*.js|*.jsx|*.css=npx prettier --write
#   *.py=ruff format
FORMAT_RULES=""
#   *.py=ruff check
#   *.ts|*.tsx|*.js|*.jsx=npx oxlint
#   *.php=php -l
LINT_RULES=""
# ------------------------------------------------------------------------------

# -- TAILOR: extra guard-protected paths (hooks/guard-config.sh policy) --------
# Repo-relative globs appended to guard-config.sh's built-in mechanism set
# (hook scripts, checker/installer/sync machinery, manifests, hook wiring,
# CI workflows — those defaults are kit knowledge and live in the hook).
# Add the lint and formatter configs an agent could edit to make findings
# disappear, and any repo-specific config that disarms a layer. Examples:
#   GUARD_PROTECTED_EXTRA=".eslintrc* eslint.config.* biome.json ruff.toml phpstan.neon"
GUARD_PROTECTED_EXTRA=""
# ------------------------------------------------------------------------------

# Local observability: hooks append exact-v2 deny/advisory/categorical lint-count
# events to .harness/var/log.jsonl; exact-v1 reviewer lines and v2 verify-gate events
# may coexist. Raw lint diagnostics are never persisted. `audit-log.sh` owns the
# mixed-log summary. Git-ignored and enabled by default; set to 0 to disable.
HARNESS_LOG=1

# Optional hint appended to guard-config.sh deny messages — a per-repo pointer
# to where a blocked edit SHOULD have gone (empty by default, so the generic
# deny contract is unchanged). A repo that ships its behavior from a templates/
# dir, for example, can point edits there instead of the installed copy.
GUARD_DENY_HINT=""

# session-context.sh banner: number of recent commits to show (0 = omit the
# block). Default 0 — the context-efficiency audit found no in-session consumer
# across 60+ transcripts, and it costs ~70 tokens every session and subagent.
# Raise it if cross-session resume benefits from recent history.
BANNER_RECENT_COMMITS=0

# -- TAILOR: secret-file classification ----------------------------------------
# Single source for the secret-read policy: hooks/guard-secrets.sh enforces it
# at read time, and check-harness.sh verifies the native provider deny lists
# (.claude/settings.json) stay in sync. Space-separated basename globs,
# matched case-insensitively; allow patterns win over secret patterns.
# Mirror any additions into hooks/test-guard-secrets.sh cases.
SECRET_ALLOW_PATTERNS=".env.example .env.sample .env.dist .env.testing *.example"
SECRET_PATTERNS=".env .env.* auth.json credentials.json *.pem id_rsa id_ed25519"
# ------------------------------------------------------------------------------
